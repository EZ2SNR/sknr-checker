<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세나리버스 세팅 판정기</title>
<style>
  :root {
    --bg: #101318; --panel: #181d25; --panel2: #1f2530; --line: #2b3340;
    --text: #dde2ea; --dim: #8a92a3;
    --gold: #d9a441; --gold-dim: #8a6a2e;
    --ok: #58b97c; --warn: #d9a441; --bad: #d96a5e;
    --sans: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
    --mono: "Consolas", "Menlo", monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--sans); font-size: 14px; line-height: 1.6;
    max-width: 720px; margin: 0 auto; padding: 24px 16px 60px;
  }
  header { margin-bottom: 20px; }
  .title-row { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
  h1 .gold { color: var(--gold); }
  .ver { color: var(--dim); font-size: 12px; font-family: var(--mono); }
  .notice {
    margin-top: 10px; padding: 8px 12px; border-radius: 7px;
    background: rgba(217,164,65,.1); border: 1px solid rgba(217,164,65,.4);
    color: var(--warn); font-size: 13px;
  }
  .mode-toggle { display: inline-flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; margin-top: 12px; }
  .mode-toggle button {
    background: transparent; color: var(--dim); border: 0; padding: 7px 18px;
    font-family: var(--sans); font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .mode-toggle button.active { background: var(--gold); color: #14161a; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 16px; margin-bottom: 14px; }
  .card h2 { font-size: 12px; font-weight: 700; color: var(--dim); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 12px; }
  .field-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; color: var(--dim); font-weight: 600; }
  select, input[type=number], input[type=text] {
    background: var(--bg); color: var(--text); border: 1px solid var(--line);
    border-radius: 7px; padding: 8px 10px; font-family: var(--sans); font-size: 14px; min-width: 120px;
  }
  input[type=number] { width: 100px; min-width: 0; }
  select:focus, input:focus { outline: 2px solid var(--gold-dim); border-color: var(--gold-dim); }
  .char-meta { margin-top: 10px; font-size: 13px; color: var(--dim); }
  .char-meta b { color: var(--text); font-weight: 600; }
  .tag { display: inline-block; background: var(--panel2); border: 1px solid var(--line); border-radius: 4px; padding: 1px 7px; font-size: 11px; color: var(--gold); margin-left: 4px; }
  .gauge-wrap { margin: 14px 0 4px; }
  .gauge-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--dim); margin-bottom: 4px; font-family: var(--mono); }
  .gauge { position: relative; height: 26px; background: var(--panel2); border-radius: 6px; overflow: hidden; border: 1px solid var(--line); }
  .gauge .band {
    position: absolute; top: 0; bottom: 0;
    background: linear-gradient(180deg, rgba(217,164,65,.32), rgba(217,164,65,.14));
    border-left: 1px solid var(--gold-dim); border-right: 1px solid var(--gold-dim);
  }
  .gauge .band-num { position: absolute; top: 50%; transform: translateY(-50%); font-family: var(--mono); font-size: 11px; color: var(--gold); }
  .gauge .marker { position: absolute; top: -2px; bottom: -2px; width: 3px; border-radius: 2px; background: var(--text); transition: left .25s ease; }
  .gauge .marker.ok { background: var(--ok); box-shadow: 0 0 8px rgba(88,185,124,.7); }
  .gauge .marker.bad { background: var(--bad); box-shadow: 0 0 8px rgba(217,106,94,.7); }
  .gauge .marker.warn { background: var(--warn); box-shadow: 0 0 8px rgba(217,164,65,.7); }
  .verdict-line { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 13px; flex-wrap: wrap; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.ok { background: var(--ok); } .dot.warn { background: var(--warn); } .dot.bad { background: var(--bad); }
  .verdict-line .msg.ok { color: var(--ok); } .verdict-line .msg.warn { color: var(--warn); } .verdict-line .msg.bad { color: var(--bad); }
  .routing-note {
    margin-top: 10px; padding: 8px 12px; border-radius: 7px;
    background: rgba(110,168,216,.08); border: 1px solid rgba(110,168,216,.35);
    color: #9cc4e4; font-size: 13px; display: none;
  }
  .audit-out { margin-top: 12px; font-size: 13px; }
  .audit-out .row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--line); font-family: var(--mono); font-size: 12.5px; }
  .audit-out .row span:first-child { color: var(--dim); font-family: var(--sans); }
  .preset-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
  button.act {
    background: var(--panel2); color: var(--text); border: 1px solid var(--line);
    border-radius: 7px; padding: 8px 14px; font-family: var(--sans); font-size: 13px; font-weight: 600; cursor: pointer;
  }
  button.act:hover { border-color: var(--gold-dim); }
  button.act.primary { background: var(--gold); color: #14161a; border-color: var(--gold); }
  .preset-list { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
  .preset-item {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--panel2); border: 1px solid var(--line); border-radius: 7px; padding: 8px 12px; font-size: 13px;
  }
  .preset-item .info { color: var(--dim); font-family: var(--mono); font-size: 12px; }
  .preset-item .btns { display: flex; gap: 6px; }
  .preset-item button { padding: 4px 10px; font-size: 12px; }
  .storage-note { margin-top: 10px; font-size: 12px; color: var(--dim); }
  .hidden { display: none !important; }
  .empty { color: var(--dim); font-size: 13px; }
  .footnote { color: var(--dim); font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>

<header>
  <div class="title-row">
    <h1>세나리버스 <span class="gold">세팅 판정기</span></h1>
    <span class="ver">v0.3 · 한계 교환 모델</span>
  </div>
  <div class="notice">월요일 공성전은 실측 검증 완료 데이터입니다. 나머지 콘텐츠는 검증 후 순차 추가됩니다.</div>
  <div class="mode-toggle" role="tablist">
    <button id="modeBasic" class="active">Basic</button>
    <button id="modeStandard">Standard</button>
  </div>
</header>

<!-- 1. 선택 -->
<div class="card">
  <h2>콘텐츠 · 캐릭터</h2>
  <div class="field-row">
    <div class="field"><label for="contentSel">콘텐츠</label><select id="contentSel"></select></div>
    <div class="field"><label for="charSel">캐릭터</label><select id="charSel"></select></div>
  </div>
  <div class="char-meta" id="charMeta"></div>
</div>

<!-- 2. 스탯 입력 + 판정 -->
<div class="card">
  <h2>스탯 입력 → 판정 <span style="text-transform:none">(게임 화면의 명목 수치 그대로)</span></h2>
  <div class="field-row">
    <div class="field"><label>치확 (명목)</label><input type="number" id="inCC" value="60" min="0" max="100"></div>
    <div class="field"><label>치피</label><input type="number" id="inCD" value="300" min="150"></div>
    <div class="field"><label>약확 (명목)</label><input type="number" id="inWC" value="40" min="0" max="100"></div>
    <div class="field std-only hidden"><label>공격력 <span style="font-weight:400">(선택)</span></label><input type="number" id="inATK" placeholder="비우면 경고 꺼짐"></div>
  </div>

  <div class="gauge-wrap">
    <div class="gauge-label"><span>치확 밴드 (명목)</span><span id="ccBandText"></span></div>
    <div class="gauge" id="ccGauge"><div class="band"></div><span class="band-num"></span><div class="marker"></div></div>
  </div>
  <div class="verdict-line" id="ccVerdict"></div>

  <div class="gauge-wrap" id="wcGaugeWrap">
    <div class="gauge-label"><span>약확 구간 (명목)</span><span id="wcBandText"></span></div>
    <div class="gauge" id="wcGauge"><div class="band"></div><span class="band-num"></span><div class="marker"></div></div>
  </div>
  <div class="verdict-line" id="wcVerdict"></div>

  <div class="routing-note" id="routingNote"></div>
</div>

<!-- 3. 줄 감사 -->
<div class="card">
  <h2>줄 감사 <span style="text-transform:none">(장비 부옵이 어디에 몇 줄 갔는지 역산)</span></h2>
  <div class="field-row">
    <div class="field"><label>무기1 주옵</label>
      <select id="main1"><option value="cd">치피 (36)</option><option value="cc">치확 (24)</option><option value="wc">약확 (28)</option></select>
    </div>
    <div class="field"><label>무기2 주옵</label>
      <select id="main2"><option value="cd">치피 (36)</option><option value="cc">치확 (24)</option><option value="wc">약확 (28)</option></select>
    </div>
    <div class="field"><label>강화 완주 (4부위 5강)</label>
      <select id="maxed"><option value="yes">완주</option><option value="no">미완주</option></select>
    </div>
  </div>
  <div class="audit-out" id="auditOut"></div>
  <div class="footnote">역산식: (결과값 − 기본 스탯 − 주옵) ÷ 1줄값. 나눠떨어지지 않으면 입력 오타 또는 장비 외 수급원(초월·펫 등) 신호입니다.</div>
</div>

<!-- 4. 프리셋 (Standard) -->
<div class="card std-only hidden">
  <h2>프리셋</h2>
  <div class="preset-row">
    <div class="field"><label for="presetName">프리셋 이름</label><input type="text" id="presetName" placeholder="예: 월공성 나타"></div>
    <button class="act primary" id="saveBtn">현재 값 저장</button>
    <button class="act" id="exportBtn">JSON 내보내기</button>
    <button class="act" id="importBtn">가져오기</button>
    <input type="file" id="importFile" accept=".json" class="hidden">
  </div>
  <div class="preset-list" id="presetList"></div>
  <div class="storage-note" id="storageNote"></div>
</div>

<!-- 데이터 번들(캐릭터/콘텐츠 DB) — 엔진보다 먼저 로드. 손 갱신은 이 파일만. -->
<script src="data.js"></script>
<script>
/* ============================================================
 * CONFIG — 게임 상수. 패치 시 여기만 수정.
 * ============================================================ */
const CONFIG = {
  varianceCoef: { best1of5: 1.163, top3of9: 1.0, single: 0 },
  bandHalfWidth: 4,
  expectationBand: [95, 100], expectationShareCut: 10,
  weakFlatWidth: 10, weakFloor: 30,
  lineVal: { cc: 4, cd: 6, wc: 5 },
  mainVal: { cc: 24, cd: 36, wc: 28 },
  baseCD: 150,
  budgetLines: 36,   // 4부위 x (기본4줄 + 강화5)
  schemaVersion: 1
};

/* ============================================================
 * 데이터 로드 — 캐릭터/콘텐츠 DB는 data.js(window.SKNR_DB)에서.
 * 위 <script src="data.js">가 이 스크립트보다 먼저 실행됨.
 * DATA_OK 이 false면 초기화를 멈추고 오류 배너를 띄운다.
 * ============================================================ */
const _DB = window.SKNR_DB || {};
const characterDB = _DB.characterDB || {};
const contentDB   = _DB.contentDB   || {};
const DATA_OK =
  !!window.SKNR_DB &&
  _DB.dataVersion === CONFIG.schemaVersion &&
  Object.keys(characterDB).length > 0 &&
  Object.keys(contentDB).length > 0;

/* ============================================================
 * ENGINE — 한계 교환 모델 (2026-07 월요일 실측 검증)
 * 목적함수: 베스트 기대값 = 평균 + c·σ
 *   S(p,b) = 1 + p·b + c·b·√(p(1−p)/n)   (p=실효치확/100, b=치피/100−1)
 * 균형점: 부옵 1줄을 치확(+4)에 둘 때와 치피(+6)에 둘 때의
 *   한계 이득이 같아지는 p를 이분법으로 풂.
 * c=0(단판)이면 해석해 p = (2/3)·b 로 수렴 (구 균형점 공식의 일반화).
 * ============================================================ */
function solveEquilibrium(b, n, c) {
  if (b <= 0) return 100;
  if (c === 0 || !n) return clamp((2/3) * b * 100, 0, 100);
  const f = p => {
    const q = p * (1 - p);
    if (q <= 0) return -1;
    const dSdp = b * (1 + c * (1 - 2*p) / (2 * Math.sqrt(n * q)));
    const dSdb = p + c * Math.sqrt(q / n);
    return CONFIG.lineVal.cc * dSdp - CONFIG.lineVal.cd * dSdb;  // 줄당 이득 차
  };
  let lo = 0.51, hi = 0.999;
  if (f(hi) > 0) return 100;
  if (f(lo) < 0) return 51;
  for (let i = 0; i < 60; i++) {
    const m = (lo + hi) / 2;
    if (f(m) > 0) lo = m; else hi = m;
  }
  return ((lo + hi) / 2) * 100;
}

function isExpectation(chId, content) {
  return (content.shares[chId] ?? 0) <= CONFIG.expectationShareCut;
}

// 치확 밴드 — 명목 기준으로 반환 (실효 밴드에서 버프분 차감)
function critBand(chId, content, cd) {
  const ch = characterDB[chId];
  const buff = (ch.critSelfBuff || 0);
  if (isExpectation(chId, content)) {
    return { band: [...CONFIG.expectationBand], type: "expectation", buff: 0 };
  }
  const b = cd / 100 - 1;
  const n = content.hits[chId] || 1;
  const c = CONFIG.varianceCoef[content.scoring] ?? 0;
  const eq = solveEquilibrium(b, n, c);
  const lo = clamp(eq - CONFIG.bandHalfWidth - buff, 0, 100);
  const hi = clamp(eq + CONFIG.bandHalfWidth - buff, 0, 100);
  return { band: [r1(lo), r1(hi)], type: "balance", eq: r1(eq), buff };
}

// 약확 구간 — 명목 기준 (콘텐츠 버프 차감)
function weakBand(chId, content) {
  const ch = characterDB[chId];
  if (ch.weakType === "none") return { band: null, type: "none" };
  const buff = content.weakBuff?.[chId] || 0;
  if (ch.weakType === "missZero") return { band: [100 - buff, 100 - buff], type: "missZero" };
  const hi = ch.reqWeakEff - buff;
  const lo = Math.max(hi - CONFIG.weakFlatWidth, CONFIG.weakFloor - buff);
  return { band: [Math.max(lo, 0), Math.max(hi, 0)], type: "bonusFlat" };
}

// 줄 감사 — 결과값 역산
function lineAudit(chId, stats, mains, maxed) {
  const ch = characterDB[chId];
  const mainSum = { cc: 0, cd: 0, wc: 0 };
  mains.forEach(m => mainSum[m] += CONFIG.mainVal[m]);
  const defs = [
    { key: "cc", label: "치확", gear: stats.cc - ch.baseStats.cc - mainSum.cc },
    { key: "cd", label: "치피", gear: stats.cd - CONFIG.baseCD - mainSum.cd },
    { key: "wc", label: "약확", gear: stats.wc - ch.baseStats.wc - mainSum.wc }
  ];
  const rows = []; let total = 0; let hasError = false;
  defs.forEach(d => {
    const lines = d.gear / CONFIG.lineVal[d.key];
    if (d.gear < 0) { rows.push({ label: d.label, text: `음수 (${d.gear}) — 주옵 구성 확인`, err: true }); hasError = true; }
    else if (!Number.isInteger(lines)) { rows.push({ label: d.label, text: `${d.gear} — ${CONFIG.lineVal[d.key]}로 나눠떨어지지 않음 ⚠`, err: true }); hasError = true; }
    else { rows.push({ label: d.label, text: `${lines}줄 (${d.gear})`, err: false }); total += lines; }
  });
  return { rows, total, untracked: maxed && !hasError ? CONFIG.budgetLines - total : null, hasError };
}

function clamp(x, a, b) { return Math.min(b, Math.max(a, x)); }
function r1(x) { return Math.round(x * 10) / 10; }

/* ============================================================
 * 저장 어댑터 — localStorage 가능 시 영구, 아니면 세션 메모리
 * ============================================================ */
const store = (() => {
  let mem = {}; let persistent = false;
  try { const t = "__t__"; window.localStorage.setItem(t, "1"); window.localStorage.removeItem(t); persistent = true; } catch (e) {}
  const KEY = "sknr_presets_v" + CONFIG.schemaVersion;
  return {
    persistent,
    load() { if (persistent) { try { return JSON.parse(localStorage.getItem(KEY) || "{}"); } catch (e) { return {}; } } return mem; },
    save(d) { if (persistent) { try { localStorage.setItem(KEY, JSON.stringify(d)); } catch (e) {} } else { mem = d; } }
  };
})();

/* ============================================================
 * UI
 * ============================================================ */
const $ = id => document.getElementById(id);
let mode = "basic";

function curContentId() { return $("contentSel").value; }
function curContent() { return contentDB[curContentId()]; }
function curCharId() { return $("charSel").value; }

function initSelects() {
  $("contentSel").innerHTML = Object.entries(contentDB).map(([k, v]) => `<option value="${k}">${v.name}</option>`).join("");
  fillChars();
}
function fillChars() {
  $("charSel").innerHTML = curContent().roster.map(id => `<option value="${id}">${characterDB[id].name}</option>`).join("");
}

function renderMeta() {
  const c = curContent(), id = curCharId(), ch = characterDB[id];
  const share = c.shares[id] ?? 0;
  const hits = c.hits[id];
  const wt = { bonus: "보너스형", missZero: "미스=딜0형", none: "약공 없음" }[ch.weakType];
  const tags = [];
  if (isExpectation(id, c)) tags.push('<span class="tag">기댓값형</span>');
  if (ch.critSelfBuff) tags.push(`<span class="tag">패시브 치확+${ch.critSelfBuff}</span>`);
  if (c.weakBuff?.[id]) tags.push(`<span class="tag">약확 버프+${c.weakBuff[id]}</span>`);
  $("charMeta").innerHTML =
    `지분 <b>${share}%</b>` + (hits ? ` · 타수 <b>${hits}</b>` : "") + ` · 약공 <b>${wt}</b>` + tags.join("") +
    (c.record ? `<br>콘텐츠 기록 <b>${c.record.toLocaleString()}</b> · 로테이션: <span style="font-size:12px">${c.rotation}</span>` : "");
}

function renderGauge(gaugeEl, band, value, textEl) {
  const bandDiv = gaugeEl.querySelector(".band"), marker = gaugeEl.querySelector(".marker"), num = gaugeEl.querySelector(".band-num");
  const [lo, hi] = band;
  const min = Math.max(0, Math.min(lo, value) - 15), max = Math.min(115, Math.max(hi, value) + 15);
  const pct = x => ((x - min) / (max - min)) * 100;
  bandDiv.style.left = pct(lo) + "%";
  bandDiv.style.width = Math.max(pct(hi) - pct(lo), 1.5) + "%";
  num.textContent = lo === hi ? lo : `${lo}~${hi}`;
  num.style.left = `calc(${pct(lo)}% + 8px)`;
  const cls = value < lo ? "bad" : value > hi ? "warn" : "ok";
  marker.className = "marker " + cls;
  marker.style.left = `calc(${clamp(pct(value), 0, 100)}% - 1px)`;
  textEl.textContent = `입력 ${value}`;
  return cls;
}

function verdictMsg(el, cls, stat, band, value, extra) {
  const [lo, hi] = band;
  const msg = cls === "ok" ? "밴드 내 — 유지"
    : cls === "bad" ? `부족 (${value} < ${lo}) — ${stat} 줄 보강`
    : `과잉 (${value} > ${hi}) — 초과분 치피 회수 검토`;
  el.innerHTML = `<span class="dot ${cls}"></span><span class="msg ${cls}">[${stat}] ${msg}</span>` + (extra || "");
}

function renderVerdict() {
  const c = curContent(), id = curCharId();
  const cc = +$("inCC").value || 0, cd = +$("inCD").value || CONFIG.baseCD, wc = +$("inWC").value || 0;

  const cb = critBand(id, c, cd);
  const ccCls = renderGauge($("ccGauge"), cb.band, cc, $("ccBandText"));
  const extra = cb.type === "expectation"
    ? `<span style="color:var(--dim);font-size:12px">(기댓값형 — 점수 확정성 우선)</span>`
    : `<span style="color:var(--dim);font-size:12px">(균형점 실효 ${cb.eq}${cb.buff ? ` = 명목 ${r1(cb.eq - cb.buff)} + 버프 ${cb.buff}` : ""})</span>`;
  verdictMsg($("ccVerdict"), ccCls, "치확", cb.band, cc, extra);

  const wb = weakBand(id, c);
  if (wb.band === null) {
    $("wcGaugeWrap").classList.add("hidden");
    $("wcVerdict").innerHTML = `<span class="dot ok"></span><span class="msg ok">[약확] 약공 없음 — 판정 제외</span>`;
  } else {
    $("wcGaugeWrap").classList.remove("hidden");
    const wcCls = renderGauge($("wcGauge"), wb.band, wc, $("wcBandText"));
    verdictMsg($("wcVerdict"), wcCls, "약확", wb.band, wc);
  }

  renderRouting();
  renderAudit();
}

function renderRouting() {
  const el = $("routingNote"); el.style.display = "none";
  if (mode !== "standard") return;
  const r = curContent().buffRouting;
  if (r) { el.style.display = "block"; el.textContent = "ℹ " + r.note; }
}

function renderAudit() {
  const id = curCharId();
  const stats = { cc: +$("inCC").value || 0, cd: +$("inCD").value || CONFIG.baseCD, wc: +$("inWC").value || 0 };
  const mains = [$("main1").value, $("main2").value];
  const maxed = $("maxed").value === "yes";
  const a = lineAudit(id, stats, mains, maxed);
  let html = a.rows.map(r =>
    `<div class="row"><span>${r.label}</span><span class="${r.err ? 'bad' : ''}">${r.text}</span></div>`).join("");
  if (!a.hasError) {
    html += `<div class="row"><span>유효줄 합계</span><span><b>${a.total}줄</b>${maxed ? ` / ${CONFIG.budgetLines}줄` : ""}</span></div>`;
    if (a.untracked !== null) {
      const cls = a.untracked <= 4 ? "ok" : "warn";
      html += `<div class="row"><span>미추적 (잡옵·공%·모공 등)</span><span class="${cls}">${a.untracked}줄 — 개선 여지</span></div>`;
    }
  }
  $("auditOut").innerHTML = html;
}

/* ---------- 프리셋 ---------- */
function presetData() {
  return {
    v: CONFIG.schemaVersion, content: curContentId(), char: curCharId(),
    stats: { cc: +$("inCC").value, cd: +$("inCD").value, wc: +$("inWC").value, atk: $("inATK").value === "" ? null : +$("inATK").value },
    mains: [$("main1").value, $("main2").value],
    savedAt: new Date().toISOString().slice(0, 10)
  };
}
function renderPresets() {
  const all = store.load(), names = Object.keys(all), list = $("presetList");
  if (!names.length) { list.innerHTML = `<div class="empty">저장된 프리셋이 없습니다.</div>`; return; }
  list.innerHTML = names.map(n => {
    const p = all[n], cname = characterDB[p.char]?.name ?? p.char;
    return `<div class="preset-item">
      <div><b>${n}</b> <span class="info">${cname} · 치확${p.stats.cc}/치피${p.stats.cd}/약확${p.stats.wc}${p.stats.atk != null ? "/공" + p.stats.atk : ""} · ${p.savedAt}</span></div>
      <div class="btns"><button class="act" data-load="${n}">불러오기</button><button class="act" data-del="${n}">삭제</button></div>
    </div>`;
  }).join("");
}
function savePreset() {
  const name = $("presetName").value.trim();
  if (!name) { $("presetName").focus(); return; }
  const all = store.load(); all[name] = presetData(); store.save(all); renderPresets();
}
function loadPreset(name) {
  const p = store.load()[name]; if (!p) return;
  if (p.content in contentDB) $("contentSel").value = p.content;
  fillChars();
  if (p.char in characterDB) $("charSel").value = p.char;
  $("inCC").value = p.stats.cc; $("inCD").value = p.stats.cd; $("inWC").value = p.stats.wc;
  $("inATK").value = p.stats.atk ?? "";
  if (p.mains) { $("main1").value = p.mains[0]; $("main2").value = p.mains[1]; }
  renderMeta(); renderVerdict();
}
function delPreset(name) { const all = store.load(); delete all[name]; store.save(all); renderPresets(); }
function exportJSON() {
  const blob = new Blob([JSON.stringify(store.load(), null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "sknr_presets.json"; a.click();
  URL.revokeObjectURL(a.href);
}
function importJSON(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try { const data = JSON.parse(reader.result); const all = store.load(); Object.assign(all, data); store.save(all); renderPresets(); }
    catch (e) { alert("JSON 형식이 올바르지 않습니다."); }
  };
  reader.readAsText(file);
}

/* ---------- 모드 + 이벤트 ---------- */
function setMode(m) {
  mode = m;
  $("modeBasic").classList.toggle("active", m === "basic");
  $("modeStandard").classList.toggle("active", m === "standard");
  document.querySelectorAll(".std-only").forEach(el => el.classList.toggle("hidden", m !== "standard"));
  renderVerdict();
}
$("modeBasic").addEventListener("click", () => setMode("basic"));
$("modeStandard").addEventListener("click", () => setMode("standard"));
$("contentSel").addEventListener("change", () => { fillChars(); renderMeta(); renderVerdict(); });
$("charSel").addEventListener("change", () => { renderMeta(); renderVerdict(); });
["inCC", "inCD", "inWC", "inATK"].forEach(id => $(id).addEventListener("input", renderVerdict));
["main1", "main2", "maxed"].forEach(id => $(id).addEventListener("change", renderAudit));
$("saveBtn").addEventListener("click", savePreset);
$("exportBtn").addEventListener("click", exportJSON);
$("importBtn").addEventListener("click", () => $("importFile").click());
$("importFile").addEventListener("change", e => { if (e.target.files[0]) importJSON(e.target.files[0]); e.target.value = ""; });
$("presetList").addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  if (b.dataset.load) loadPreset(b.dataset.load);
  if (b.dataset.del) delPreset(b.dataset.del);
});

$("storageNote").textContent = store.persistent
  ? "프리셋은 이 브라우저에 저장됩니다. 기기 이동 시 JSON 내보내기를 사용하십시오."
  : "미리보기 환경 — 프리셋은 이 세션에만 유지됩니다.";

function showDataError() {
  const msg = !window.SKNR_DB
    ? "data.js 를 불러오지 못했습니다. index.html 과 같은 폴더에 data.js 가 있는지 확인하십시오."
    : `데이터 버전 불일치 — data.js(dataVersion ${_DB.dataVersion}) 와 엔진(schemaVersion ${CONFIG.schemaVersion}) 이 다릅니다. 두 파일을 같은 버전으로 맞춰 주십시오.`;
  const el = document.createElement("div");
  el.style.cssText = "margin:16px 0;padding:14px 16px;border:1px solid #a33;border-radius:8px;background:rgba(180,40,40,.12);color:#f2b8b8;font-size:14px;line-height:1.6";
  el.textContent = "⚠ 데이터 로드 실패 — " + msg;
  document.querySelector("header").insertAdjacentElement("afterend", el);
}

if (DATA_OK) {
  initSelects(); renderMeta(); setMode("basic"); renderPresets();
} else {
  showDataError();
}
</script>
</body>
</html>
