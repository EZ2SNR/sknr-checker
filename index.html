<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세나리버스 세팅 판정기</title>
<style>
  :root {
    --bg: #101318;
    --panel: #181d25;
    --panel2: #1f2530;
    --line: #2b3340;
    --text: #dde2ea;
    --dim: #8a92a3;
    --gold: #d9a441;
    --gold-dim: #8a6a2e;
    --ok: #58b97c;
    --warn: #d9a441;
    --bad: #d96a5e;
    --sans: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
    --mono: "Consolas", "Menlo", monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--sans); font-size: 14px; line-height: 1.6;
    max-width: 720px; margin: 0 auto; padding: 24px 16px 60px;
  }

  /* ---------- 헤더 ---------- */
  header { margin-bottom: 20px; }
  .title-row { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
  h1 .gold { color: var(--gold); }
  .ver { color: var(--dim); font-size: 12px; font-family: var(--mono); }

  .mode-toggle {
    display: inline-flex; border: 1px solid var(--line); border-radius: 8px;
    overflow: hidden; margin-top: 12px;
  }
  .mode-toggle button {
    background: transparent; color: var(--dim); border: 0; padding: 7px 18px;
    font-family: var(--sans); font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .mode-toggle button.active { background: var(--gold); color: #14161a; }

  /* ---------- 카드 ---------- */
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 16px; margin-bottom: 14px;
  }
  .card h2 {
    font-size: 12px; font-weight: 700; color: var(--dim);
    letter-spacing: .1em; text-transform: uppercase; margin-bottom: 12px;
  }

  /* ---------- 선택 ---------- */
  .field-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; color: var(--dim); font-weight: 600; }
  select, input[type=number], input[type=text] {
    background: var(--bg); color: var(--text); border: 1px solid var(--line);
    border-radius: 7px; padding: 8px 10px; font-family: var(--sans); font-size: 14px;
    min-width: 120px;
  }
  input[type=number] { width: 100px; min-width: 0; }
  select:focus, input:focus { outline: 2px solid var(--gold-dim); border-color: var(--gold-dim); }

  .char-meta { margin-top: 10px; font-size: 13px; color: var(--dim); }
  .char-meta b { color: var(--text); font-weight: 600; }
  .tag {
    display: inline-block; background: var(--panel2); border: 1px solid var(--line);
    border-radius: 4px; padding: 1px 7px; font-size: 11px; color: var(--gold); margin-left: 4px;
  }

  /* ---------- 밴드 게이지 (시그니처) ---------- */
  .gauge-wrap { margin: 14px 0 4px; }
  .gauge-label {
    display: flex; justify-content: space-between; font-size: 12px;
    color: var(--dim); margin-bottom: 4px; font-family: var(--mono);
  }
  .gauge {
    position: relative; height: 26px; background: var(--panel2);
    border-radius: 6px; overflow: hidden; border: 1px solid var(--line);
  }
  .gauge .band {
    position: absolute; top: 0; bottom: 0;
    background: linear-gradient(180deg, rgba(217,164,65,.32), rgba(217,164,65,.14));
    border-left: 1px solid var(--gold-dim); border-right: 1px solid var(--gold-dim);
  }
  .gauge .band-num {
    position: absolute; top: 50%; transform: translateY(-50%);
    font-family: var(--mono); font-size: 11px; color: var(--gold);
  }
  .gauge .marker {
    position: absolute; top: -2px; bottom: -2px; width: 3px; border-radius: 2px;
    background: var(--text); box-shadow: 0 0 6px rgba(255,255,255,.5);
    transition: left .25s ease;
  }
  .gauge .marker.ok { background: var(--ok); box-shadow: 0 0 8px rgba(88,185,124,.7); }
  .gauge .marker.bad { background: var(--bad); box-shadow: 0 0 8px rgba(217,106,94,.7); }
  .gauge .marker.warn { background: var(--warn); box-shadow: 0 0 8px rgba(217,164,65,.7); }

  /* ---------- 판정 ---------- */
  .verdict-line { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 13px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.ok { background: var(--ok); } .dot.warn { background: var(--warn); } .dot.bad { background: var(--bad); }
  .verdict-line .msg.ok { color: var(--ok); } .verdict-line .msg.warn { color: var(--warn); } .verdict-line .msg.bad { color: var(--bad); }

  .routing-warn {
    margin-top: 10px; padding: 8px 12px; border-radius: 7px;
    background: rgba(217,106,94,.1); border: 1px solid rgba(217,106,94,.4);
    color: var(--bad); font-size: 13px; display: none;
  }

  /* ---------- 프리셋 ---------- */
  .preset-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
  button.act {
    background: var(--panel2); color: var(--text); border: 1px solid var(--line);
    border-radius: 7px; padding: 8px 14px; font-family: var(--sans); font-size: 13px;
    font-weight: 600; cursor: pointer;
  }
  button.act:hover { border-color: var(--gold-dim); }
  button.act.primary { background: var(--gold); color: #14161a; border-color: var(--gold); }
  .preset-list { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
  .preset-item {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--panel2); border: 1px solid var(--line); border-radius: 7px;
    padding: 8px 12px; font-size: 13px;
  }
  .preset-item .info { color: var(--dim); font-family: var(--mono); font-size: 12px; }
  .preset-item .btns { display: flex; gap: 6px; }
  .preset-item button { padding: 4px 10px; font-size: 12px; }
  .storage-note { margin-top: 10px; font-size: 12px; color: var(--dim); }
  .hidden { display: none !important; }
  .empty { color: var(--dim); font-size: 13px; }
</style>
</head>
<body>

<header>
  <div class="title-row">
    <h1>세나리버스 <span class="gold">세팅 판정기</span></h1>
    <span class="ver">v0.2 · 더미 DB</span>
  </div>
  <div style="margin-top:10px;padding:8px 12px;border-radius:7px;background:rgba(217,164,65,.1);border:1px solid rgba(217,164,65,.4);color:var(--warn);font-size:13px">
    ⚠ 현재 더미 데이터로 동작하는 개발 중 버전입니다. 실제 캐릭터·콘텐츠 데이터는 검증 후 순차 반영됩니다.
  </div>
  <div class="mode-toggle" role="tablist">
    <button id="modeBasic" class="active">Basic</button>
    <button id="modeStandard">Standard</button>
  </div>
</header>

<!-- 1. 선택 -->
<div class="card">
  <h2>콘텐츠 · 캐릭터</h2>
  <div class="field-row">
    <div class="field">
      <label for="contentSel">콘텐츠</label>
      <select id="contentSel"></select>
    </div>
    <div class="field">
      <label for="charSel">캐릭터</label>
      <select id="charSel"></select>
    </div>
  </div>
  <div class="char-meta" id="charMeta"></div>
</div>

<!-- 2. 스탯 입력 + 게이지 -->
<div class="card">
  <h2>스탯 입력 → 판정</h2>
  <div class="field-row">
    <div class="field"><label>실효 치확</label><input type="number" id="inCC" value="85" min="0" max="100"></div>
    <div class="field"><label>치피</label><input type="number" id="inCD" value="240" min="150"></div>
    <div class="field"><label>실효 약확</label><input type="number" id="inWC" value="70" min="0" max="100"></div>
    <div class="field std-only hidden"><label>공격력 <span style="font-weight:400">(선택)</span></label><input type="number" id="inATK" placeholder="비우면 경고 꺼짐"></div>
  </div>

  <div class="gauge-wrap">
    <div class="gauge-label"><span>치확 밴드</span><span id="ccBandText"></span></div>
    <div class="gauge" id="ccGauge"><div class="band"></div><span class="band-num"></span><div class="marker"></div></div>
  </div>
  <div class="verdict-line" id="ccVerdict"></div>

  <div class="gauge-wrap" id="wcGaugeWrap">
    <div class="gauge-label"><span>약확 구간</span><span id="wcBandText"></span></div>
    <div class="gauge" id="wcGauge"><div class="band"></div><span class="band-num"></span><div class="marker"></div></div>
  </div>
  <div class="verdict-line" id="wcVerdict"></div>

  <div class="routing-warn" id="routingWarn"></div>
</div>

<!-- 3. 프리셋 (Standard) -->
<div class="card std-only hidden">
  <h2>프리셋</h2>
  <div class="preset-row">
    <div class="field">
      <label for="presetName">프리셋 이름</label>
      <input type="text" id="presetName" placeholder="예: 금공성 미호">
    </div>
    <button class="act primary" id="saveBtn">현재 값 저장</button>
    <button class="act" id="exportBtn">JSON 내보내기</button>
    <button class="act" id="importBtn">가져오기</button>
    <input type="file" id="importFile" accept=".json" class="hidden">
  </div>
  <div class="preset-list" id="presetList"></div>
  <div class="storage-note" id="storageNote"></div>
</div>

<script>
/* ============================================================
 * CONFIG + DB + ENGINE — v0.1 엔진 동일 (검산 PASS 상태)
 * ============================================================ */
const CONFIG = {
  varianceCoef: { best1of5: 1.163, top3of9: 1.0, single: 0 },
  shaveK: 37.17, bandHalfWidth: 4,
  expectationBand: [95, 100], expectationShareCut: 10,
  weakFlatWidth: 10, weakFloor: 30,
  schemaVersion: 1
};

const characterDB = {
  "dummy_miho":   { name:"더미-미호형",   weakType:"bonus",   reqWeak:80,  flags:{}, skills:{passive:{hits:0},upper:{hits:18},lower:{hits:24},basic:{hits:0}} },
  "dummy_speed":  { name:"더미-속딜형",   weakType:"missZero",reqWeak:100, flags:{}, skills:{passive:{hits:0},upper:{hits:4},lower:{hits:6},basic:{hits:0}} },
  "dummy_pascal": { name:"더미-파스칼형", weakType:"bonus",   reqWeak:70,  flags:{excludeCritChance:true}, skills:{passive:{hits:0},upper:{hits:12},lower:{hits:14},basic:{hits:0}} },
  "dummy_buffer": { name:"더미-버퍼형",   weakType:"none",    reqWeak:null,flags:{basicAttackOnly:true}, skills:{passive:{hits:0},upper:{hits:0},lower:{hits:0},basic:{hits:2}} }
};

const contentDB = {
  "friday_siege": { name:"금요일 공성전 (더미)", scoring:"best1of5", roster:["dummy_miho","dummy_speed","dummy_pascal","dummy_buffer"],
    shares:{dummy_miho:35,dummy_speed:40,dummy_pascal:20,dummy_buffer:3}, buffRouting:null },
  "raid_r1": { name:"강림 1R (더미)", scoring:"top3of9", roster:["dummy_pascal","dummy_miho","dummy_buffer"],
    shares:{dummy_pascal:55,dummy_miho:38,dummy_buffer:4},
    buffRouting:{ target:"dummy_miho", type:"gap", ref:"dummy_pascal", value:51 } },
  "practice": { name:"연습 모드 (단판)", scoring:"single", roster:["dummy_miho","dummy_speed"],
    shares:{dummy_miho:50,dummy_speed:50}, buffRouting:null }
};

function totalHits(ch){ const s=ch.skills; return (s.passive.hits||0)+(s.upper.hits||0)+(s.lower.hits||0)+(s.basic.hits||0); }
function isExpectation(ch, share){ return share <= CONFIG.expectationShareCut || !!ch.flags.basicAttackOnly; }

function critBand(ch, content, cd){
  const share = content.shares[currentCharId()] ?? 0;
  if (isExpectation(ch, share)) return { band:[...CONFIG.expectationBand], type:"expectation" };
  const B = (2/3)*(cd-100);
  const c = CONFIG.varianceCoef[content.scoring] ?? 0;
  const shave = CONFIG.shaveK * c / Math.sqrt(Math.max(totalHits(ch),1));
  const lo = clamp(B-shave-CONFIG.bandHalfWidth,0,100), hi = clamp(B-shave+CONFIG.bandHalfWidth,0,100);
  return { band:[r1(lo),r1(hi)], type:"balance" };
}
function weakBand(ch){
  if (ch.weakType==="missZero") return { band:[100,100], type:"missZero" };
  if (ch.weakType==="bonus") return { band:[Math.max(ch.reqWeak-CONFIG.weakFlatWidth,CONFIG.weakFloor), ch.reqWeak], type:"bonusFlat" };
  return { band:null, type:"none" };
}
function clamp(x,a,b){ return Math.min(b,Math.max(a,x)); }
function r1(x){ return Math.round(x*10)/10; }

/* ============================================================
 * 저장 어댑터 — localStorage 가능하면 사용, 아니면 메모리
 * (배포 파일에선 localStorage로 영구 저장, 미리보기에선 세션 한정)
 * ============================================================ */
const store = (() => {
  let mem = {};
  let persistent = false;
  try {
    const t = "__t__"; window.localStorage.setItem(t,"1"); window.localStorage.removeItem(t);
    persistent = true;
  } catch(e) { persistent = false; }
  const KEY = "sknr_presets_v" + CONFIG.schemaVersion;
  return {
    persistent,
    load(){ if(persistent){ try{ return JSON.parse(localStorage.getItem(KEY)||"{}"); }catch(e){ return {}; } } return mem; },
    save(data){ if(persistent){ try{ localStorage.setItem(KEY, JSON.stringify(data)); }catch(e){} } else { mem = data; } }
  };
})();

/* ============================================================
 * UI 상태 + 렌더
 * ============================================================ */
const $ = id => document.getElementById(id);
let mode = "basic";

function currentCharId(){ return $("charSel").value; }
function currentContent(){ return contentDB[$("contentSel").value]; }
function currentChar(){ return characterDB[currentCharId()]; }

function initSelects(){
  $("contentSel").innerHTML = Object.entries(contentDB).map(([k,v])=>`<option value="${k}">${v.name}</option>`).join("");
  fillChars();
}
function fillChars(){
  const c = currentContent();
  $("charSel").innerHTML = c.roster.map(id=>`<option value="${id}">${characterDB[id].name}</option>`).join("");
}

function renderMeta(){
  const ch = currentChar(), c = currentContent();
  const share = c.shares[currentCharId()] ?? 0;
  const tags = [];
  if (ch.flags.excludeCritChance) tags.push('<span class="tag">치확 제외</span>');
  if (ch.flags.basicAttackOnly) tags.push('<span class="tag">평타 요원</span>');
  const wt = { bonus:"보너스형", missZero:"미스=딜0형", none:"약공 없음" }[ch.weakType];
  $("charMeta").innerHTML =
    `타수 <b>${totalHits(ch)}</b> · 지분 <b>${share}%</b> · 약공 <b>${wt}</b>` +
    (ch.reqWeak ? ` · 요구 약확 <b>${ch.reqWeak}</b>` : "") + tags.join("");
}

function renderGauge(gaugeEl, band, value, textEl){
  const bandDiv = gaugeEl.querySelector(".band");
  const marker = gaugeEl.querySelector(".marker");
  const num = gaugeEl.querySelector(".band-num");
  const [lo,hi] = band;
  const min = Math.max(0, Math.min(lo, value) - 15);
  const max = Math.min(110, Math.max(hi, value) + 15);
  const pct = x => ((x-min)/(max-min))*100;
  bandDiv.style.left = pct(lo)+"%";
  bandDiv.style.width = Math.max(pct(hi)-pct(lo), 1.5)+"%";
  num.textContent = lo===hi ? lo : `${lo}~${hi}`;
  num.style.left = `calc(${pct(lo)}% + 8px)`;
  const cls = value < lo ? "bad" : value > hi ? "warn" : "ok";
  marker.className = "marker " + cls;
  marker.style.left = `calc(${clamp(pct(value),0,100)}% - 1px)`;
  textEl.textContent = `입력 ${value}`;
  return cls;
}

function verdictMsg(el, cls, stat, band, value){
  const [lo,hi] = band;
  const msg = cls==="ok" ? `밴드 내 — 유지`
    : cls==="bad" ? `부족 (${value} < ${lo}) — ${stat} 줄 보강 필요`
    : `과잉 (${value} > ${hi}) — 초과분을 치피 줄로 회수 검토`;
  el.innerHTML = `<span class="dot ${cls}"></span><span class="msg ${cls}">[${stat}] ${msg}</span>`;
}

function renderVerdict(){
  const ch = currentChar(), c = currentContent();
  const cc = +$("inCC").value || 0, cd = +$("inCD").value || 150, wc = +$("inWC").value || 0;

  const cb = critBand(ch, c, cd);
  const ccCls = renderGauge($("ccGauge"), cb.band, cc, $("ccBandText"));
  verdictMsg($("ccVerdict"), ccCls, "치확", cb.band, cc);
  if (cb.type === "expectation")
    $("ccVerdict").innerHTML += `<span style="color:var(--dim);font-size:12px">(기댓값형 — 밴드 깎기 미적용)</span>`;

  const wb = weakBand(ch);
  if (wb.band === null){
    $("wcGaugeWrap").classList.add("hidden");
    $("wcVerdict").innerHTML = `<span class="dot ok"></span><span class="msg ok">[약확] 약공 없음 — 판정 제외</span>`;
  } else {
    $("wcGaugeWrap").classList.remove("hidden");
    const wcCls = renderGauge($("wcGauge"), wb.band, wc, $("wcBandText"));
    verdictMsg($("wcVerdict"), wcCls, "약확", wb.band, wc);
  }

  renderRouting();
}

/* 버프 라우팅 경고 — Standard + 공격력 입력 + 규칙 존재 시에만 */
function renderRouting(){
  const el = $("routingWarn");
  el.style.display = "none";
  if (mode !== "standard") return;
  const c = currentContent();
  const atk = $("inATK").value;
  if (!c.buffRouting || atk === "") return;
  const r = c.buffRouting;
  // 현재 선택 캐릭터가 규칙의 기준(ref) 캐릭터일 때: 대상보다 value 이상 격차 필요
  if (r.type === "gap" && currentCharId() === r.ref) {
    el.style.display = "block";
    el.textContent = `⚠ 이 콘텐츠는 ${characterDB[r.target].name}이(가) 버프를 받아야 합니다. `
      + `${characterDB[r.ref].name}의 공격력이 ${characterDB[r.target].name}보다 ${r.value} 이상 높으면 버프가 새어나갑니다 — 입력값 ${atk} 기준으로 대상 공격력과 비교해 확인하십시오.`;
  }
}

/* ============================================================
 * 프리셋 (Standard)
 * ============================================================ */
function presetData(){
  return {
    v: CONFIG.schemaVersion, mode: "basic-stats",
    content: $("contentSel").value, char: currentCharId(),
    stats: { cc:+$("inCC").value, cd:+$("inCD").value, wc:+$("inWC").value, atk: $("inATK").value===""?null:+$("inATK").value },
    savedAt: new Date().toISOString().slice(0,10)
  };
}
function renderPresets(){
  const all = store.load();
  const list = $("presetList");
  const names = Object.keys(all);
  if (!names.length){ list.innerHTML = `<div class="empty">저장된 프리셋이 없습니다.</div>`; return; }
  list.innerHTML = names.map(n => {
    const p = all[n];
    const cname = characterDB[p.char]?.name ?? p.char;
    return `<div class="preset-item">
      <div><b>${n}</b> <span class="info">${cname} · 치확${p.stats.cc}/치피${p.stats.cd}/약확${p.stats.wc}${p.stats.atk!=null?"/공"+p.stats.atk:""} · ${p.savedAt}</span></div>
      <div class="btns">
        <button class="act" data-load="${n}">불러오기</button>
        <button class="act" data-del="${n}">삭제</button>
      </div>
    </div>`;
  }).join("");
}
function savePreset(){
  const name = $("presetName").value.trim();
  if (!name) { $("presetName").focus(); return; }
  const all = store.load(); all[name] = presetData(); store.save(all);
  renderPresets();
}
function loadPreset(name){
  const p = store.load()[name]; if (!p) return;
  if (p.content in contentDB) $("contentSel").value = p.content;
  fillChars();
  if (p.char in characterDB) $("charSel").value = p.char;
  $("inCC").value = p.stats.cc; $("inCD").value = p.stats.cd; $("inWC").value = p.stats.wc;
  $("inATK").value = p.stats.atk ?? "";
  renderMeta(); renderVerdict();
}
function delPreset(name){
  const all = store.load(); delete all[name]; store.save(all); renderPresets();
}
function exportJSON(){
  const blob = new Blob([JSON.stringify(store.load(), null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "sknr_presets.json"; a.click();
  URL.revokeObjectURL(a.href);
}
function importJSON(file){
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      const all = store.load();
      Object.assign(all, data);   // 병합 (동명 프리셋은 가져온 쪽이 덮어씀)
      store.save(all); renderPresets();
    } catch(e) { alert("JSON 형식이 올바르지 않습니다."); }
  };
  reader.readAsText(file);
}

/* ============================================================
 * 모드 전환 + 이벤트
 * ============================================================ */
function setMode(m){
  mode = m;
  $("modeBasic").classList.toggle("active", m==="basic");
  $("modeStandard").classList.toggle("active", m==="standard");
  document.querySelectorAll(".std-only").forEach(el => el.classList.toggle("hidden", m!=="standard"));
  renderVerdict();
}
$("modeBasic").addEventListener("click", ()=>setMode("basic"));
$("modeStandard").addEventListener("click", ()=>setMode("standard"));
$("contentSel").addEventListener("change", ()=>{ fillChars(); renderMeta(); renderVerdict(); });
$("charSel").addEventListener("change", ()=>{ renderMeta(); renderVerdict(); });
["inCC","inCD","inWC","inATK"].forEach(id => $(id).addEventListener("input", renderVerdict));
$("saveBtn").addEventListener("click", savePreset);
$("exportBtn").addEventListener("click", exportJSON);
$("importBtn").addEventListener("click", ()=>$("importFile").click());
$("importFile").addEventListener("change", e => { if(e.target.files[0]) importJSON(e.target.files[0]); e.target.value=""; });
$("presetList").addEventListener("click", e => {
  const b = e.target.closest("button"); if(!b) return;
  if (b.dataset.load) loadPreset(b.dataset.load);
  if (b.dataset.del) delPreset(b.dataset.del);
});

$("storageNote").textContent = store.persistent
  ? "프리셋은 이 브라우저에 저장됩니다. 기기 이동 시 JSON 내보내기를 사용하십시오."
  : "미리보기 환경 — 프리셋은 이 세션에만 유지됩니다. 파일로 내려받아 열면 브라우저에 영구 저장됩니다.";

initSelects(); renderMeta(); setMode("basic");
</script>
</body>
</html>
